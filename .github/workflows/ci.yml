name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Validate HTML
      run: |
        for file in *.html; do
          if grep -q '<!DOCTYPE html>' "$file"; then
            echo "✓ $file is valid HTML"
          else
            echo "✗ $file missing DOCTYPE"
            exit 1
          fi
        done

    - name: Verify files exist
      run: |
        test -f index.html
        test -f styles.css
        test -f js/app.js
        test -f js/data.js
        test -f js/store.js
        test -f js/plantService.js

    - name: List project files
      run: ls -la